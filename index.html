<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>מעקב שיעורי בית</title>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <style>
    /* ── THEME VARIABLES ── light/dark toggled by <body class="light"> */
    body {
      --bg:       #0a0a0f;
      --bg2:      #111;
      --bg3:      #161620;
      --border:   #222;
      --border2:  #333;
      --text:     #fff;
      --text2:    #aaa;
      --text3:    #555;
      --text4:    #333;
      --accent:   #64d2ff;
      --card-hint:#444;
    }
    body.light {
      --bg:       #f0f2f5;
      --bg2:      #fff;
      --bg3:      #f8f9fb;
      --border:   #dde1e7;
      --border2:  #c8cdd6;
      --text:     #111;
      --text2:    #555;
      --text3:    #888;
      --text4:    #bbb;
      --accent:   #0a84ff;
      --card-hint:#999;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { min-height:100vh; background:var(--bg); font-family:'Courier New',monospace;
           background-image:radial-gradient(ellipse at 20% 50%,rgba(13,26,42,.6) 0%,transparent 60%),
                            radial-gradient(ellipse at 80% 20%,rgba(26,13,26,.4) 0%,transparent 60%);
           color:var(--text); direction:rtl; transition:background .3s,color .3s; }
    body.light { background-image:none; }

    header { border-bottom:1px solid var(--border); padding:20px 28px; display:flex;
             justify-content:space-between; align-items:center;
             background:rgba(255,255,255,0.02); position:sticky; top:0; z-index:100; }
    body.light header { background:rgba(255,255,255,0.85); backdrop-filter:blur(10px); }
    .header-title-label { font-size:11px; letter-spacing:2px; color:var(--text3); margin-bottom:4px; }
    .header-title { font-size:24px; font-weight:bold; }
    .header-actions { display:flex; gap:10px; align-items:center; }
    .user-badge { font-size:12px; color:var(--text2); padding:6px 12px;
                  border:1px solid var(--border); border-radius:8px; }

    /* Settings gear button */
    .btn-gear { background:transparent; border:1px solid var(--border2); color:var(--text2);
                padding:8px 14px; border-radius:8px; cursor:pointer; font-size:16px;
                font-family:'Courier New',monospace; transition:all .2s; }
    .btn-gear:hover { border-color:var(--text); color:var(--text); }

    .btn { padding:8px 16px; border-radius:8px; cursor:pointer; font-size:12px;
           font-family:'Courier New',monospace; transition:all .2s; border:none; }
    .btn-full { width:100%; padding:14px; background:var(--text); color:var(--bg);
                border:none; border-radius:10px; cursor:pointer; font-weight:bold;
                font-size:14px; font-family:'Courier New',monospace; margin-top:8px; transition:all .2s; }
    .btn-full:hover { opacity:.88; }
    .btn-full:disabled { background:var(--border2); color:var(--text3); cursor:not-allowed; }

    main { max-width:700px; margin:0 auto; padding:40px 20px; }
    .add-btn-dashed { width:100%; padding:16px; background:transparent;
                      border:2px dashed var(--border2); color:var(--text3);
                      border-radius:16px; cursor:pointer; font-size:15px;
                      font-family:'Courier New',monospace; transition:all .2s; margin-bottom:28px; }
    .add-btn-dashed:hover { border-color:var(--text); color:var(--text); }
    .add-form { background:var(--bg2); border:1px solid var(--border2); border-radius:16px;
                padding:24px; margin-bottom:28px; display:flex; flex-direction:column; gap:12px; }
    .form-title { font-weight:bold; letter-spacing:1px; margin-bottom:4px; font-size:15px; }
    .form-row-2 { display:flex; gap:10px; }
    .form-row-2 > * { flex:1; }
    input[type=text],input[type=password],input[type=date],input[type=time],input[type=email],textarea {
      width:100%; padding:12px 14px; background:var(--bg); border:1px solid var(--border2);
      border-radius:10px; color:var(--text); font-size:14px; font-family:'Courier New',monospace;
      outline:none; text-align:right; transition:border-color .2s; }
    input:focus,textarea:focus { border-color:var(--text3); }
    input[type=date],input[type=time] { text-align:left; direction:ltr; }
    input[type=email] { text-align:left; direction:ltr; }
    input[type=date]::-webkit-calendar-picker-indicator,
    input[type=time]::-webkit-calendar-picker-indicator { filter:invert(1); }
    body.light input[type=date]::-webkit-calendar-picker-indicator,
    body.light input[type=time]::-webkit-calendar-picker-indicator { filter:none; }
    .input-label { font-size:11px; color:var(--text3); margin-bottom:4px; letter-spacing:1px; }
    textarea { resize:none; height:70px; }
    .checkbox-row { display:flex; align-items:center; gap:10px; padding:12px 14px;
                    background:var(--bg); border:1px solid var(--border2); border-radius:10px;
                    cursor:pointer; user-select:none; transition:border-color .2s; }
    .checkbox-row:hover { border-color:var(--text3); }
    .checkbox-row.active { border-color:var(--accent); }
    .custom-checkbox { width:20px; height:20px; border-radius:6px; border:2px solid var(--border2);
                       background:transparent; display:flex; align-items:center; justify-content:center;
                       flex-shrink:0; transition:all .2s; }
    .custom-checkbox.checked { background:var(--accent); border-color:var(--accent); }
    .custom-checkbox.checked::after { content:'✓'; font-size:13px; color:#000; font-weight:bold; }
    .checkbox-label { color:var(--text2); font-size:13px; transition:color .2s; }
    .checkbox-row.active .checkbox-label { color:var(--text); }
    .questions-box { overflow:hidden; max-height:0; transition:max-height .3s ease,opacity .3s ease; opacity:0; }
    .questions-box.open { max-height:120px; opacity:1; }
    .form-row { display:flex; gap:10px; }
    .form-row button { flex:1; }
    .btn-cancel { flex:1; padding:12px; background:transparent; color:var(--text3);
                  border:1px solid var(--border2); border-radius:10px; cursor:pointer;
                  font-family:'Courier New',monospace; font-size:14px; }
    .cards-list { display:flex; flex-direction:column; gap:14px; }
    .card { border-radius:16px; padding:20px 24px; display:flex; align-items:flex-start;
            transition:transform .2s; cursor:pointer; animation:fadeIn .3s ease; }
    .card:hover { transform:translateX(-4px); }
    .card-number { width:32px; height:32px; border-radius:50%; font-size:13px; font-weight:bold;
                   display:flex; align-items:center; justify-content:center;
                   margin-left:18px; flex-shrink:0; margin-top:3px; }
    .card-info { flex:1; }
    .card-subject { font-size:18px; font-weight:bold; margin-bottom:4px; }
    .card-pages { color:var(--text2); font-size:13px; }
    .card-pages span { color:var(--text); font-weight:bold; }
    .card-questions { margin-top:8px; padding:8px 12px; background:rgba(100,210,255,.08);
                      border:1px solid rgba(100,210,255,.2); border-radius:8px;
                      font-size:12px; color:var(--accent); line-height:1.5; }
    .card-questions-label { color:#3a8fa8; margin-left:4px; }
    .card-hint { font-size:11px; color:var(--card-hint); margin-top:6px; }
    .card-due { text-align:left; flex-shrink:0; }
    .card-due.has-delete { margin-left:16px; }
    .card-urgency { font-weight:bold; font-size:13px; }
    .card-date { color:var(--text3); font-size:12px; margin-top:3px; }
    .delete-btn { background:transparent; border:1px solid var(--border2); color:var(--text3);
                  width:32px; height:32px; border-radius:8px; cursor:pointer; font-size:18px;
                  display:flex; align-items:center; justify-content:center; flex-shrink:0;
                  transition:all .2s; line-height:1; margin-top:3px; }
    .delete-btn:hover { border-color:#ff2d55; color:#ff2d55; }
    .card-difficulty-badge { display:inline-flex; align-items:center; gap:5px; margin-top:6px;
                             padding:3px 9px; border-radius:20px; font-size:11px; font-weight:bold;
                             border:1px solid rgba(255,255,255,.1); background:rgba(255,255,255,.04); }
    body.light .card-difficulty-badge { background:rgba(0,0,0,.04); border-color:rgba(0,0,0,.1); }
    .empty { text-align:center; padding:80px 0; }
    .empty-emoji { font-size:48px; margin-bottom:16px; }
    .empty-text { color:var(--text3); font-size:16px; }
    .empty-sub  { color:var(--text4); font-size:13px; margin-top:8px; }
    .total-count { text-align:center; margin-top:40px; color:var(--text4); font-size:12px; letter-spacing:2px; }
    .credit { text-align:center; margin-top:8px; color:var(--text4); font-size:11px; opacity:.5; }

    /* ── MODALS ── */
    .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,.88); display:flex;
                     align-items:center; justify-content:center; backdrop-filter:blur(12px);
                     z-index:999; padding:16px; }
    .modal { background:var(--bg2); border:1px solid var(--border2); border-radius:20px;
             padding:32px; width:100%; max-width:380px; }
    .modal-title { font-weight:bold; font-size:18px; margin-bottom:6px; }
    .modal-sub   { color:var(--text3); font-size:13px; margin-bottom:24px; line-height:1.5; }
    .modal-error { color:#ff2d55; font-size:12px; margin-top:8px; padding:8px 12px;
                   background:rgba(255,45,85,.08); border:1px solid rgba(255,45,85,.2); border-radius:8px; }
    .modal-link  { color:var(--accent); cursor:pointer; font-size:12px; text-align:center; margin-top:14px; }
    .modal-link:hover { text-decoration:underline; }
    .modal-divider { height:1px; background:var(--border); margin:16px 0; }
    .field-group { margin-bottom:10px; }
    .btn-google { width:100%; padding:12px 16px; background:#fff; color:#333; border:none;
                  border-radius:10px; cursor:pointer; font-size:14px; font-family:'Courier New',monospace;
                  font-weight:bold; display:flex; align-items:center; justify-content:center;
                  gap:10px; transition:background .2s; margin-bottom:4px; }
    .btn-google:hover { background:#f0f0f0; }
    .btn-google:disabled { background:#ccc; color:#888; cursor:not-allowed; }
    .auth-divider { display:flex; align-items:center; gap:10px; margin:14px 0; }
    .auth-divider-line { flex:1; height:1px; background:var(--border); }
    .auth-divider-text { color:var(--text3); font-size:11px; letter-spacing:1px; }
    .verify-box { text-align:center; padding:8px 0; }
    .verify-icon { font-size:40px; margin-bottom:12px; }
    .verify-title { font-size:17px; font-weight:bold; margin-bottom:8px; }
    .verify-sub { color:var(--text3); font-size:13px; line-height:1.6; margin-bottom:20px; }
    .verify-email-highlight { color:var(--accent); font-weight:bold; }
    .resend-link    { color:var(--accent); cursor:pointer; font-size:12px; }
    .resend-link:hover { text-decoration:underline; }
    .resend-cooldown { color:var(--text3); font-size:12px; }
    .resend-success  { color:#30d158; font-size:12px; }

    /* ── ANSWERS MODAL ── */
    .answers-modal { background:var(--bg); border:1px solid var(--border); border-radius:20px;
                     width:100%; max-width:600px; max-height:90vh; display:flex;
                     flex-direction:column; overflow:hidden; }
    .answers-header { padding:20px 24px; border-bottom:1px solid var(--border);
                      display:flex; justify-content:space-between; align-items:center; flex-shrink:0; }
    .answers-title   { font-size:18px; font-weight:bold; }
    .answers-subject { font-size:12px; color:var(--text3); margin-top:2px; }
    .close-btn { background:transparent; border:1px solid var(--border2); color:var(--text3);
                 width:32px; height:32px; border-radius:8px; cursor:pointer; font-size:18px;
                 display:flex; align-items:center; justify-content:center; transition:all .2s; flex-shrink:0; }
    .close-btn:hover { border-color:var(--text); color:var(--text); }
    .answers-body { flex:1; overflow-y:auto; padding:20px 24px; }
    .upload-area { border:2px dashed var(--border2); border-radius:12px; padding:20px;
                   text-align:center; cursor:pointer; transition:all .2s; margin-bottom:16px; }
    .upload-area:hover { border-color:var(--accent); }
    .upload-area input { display:none; }
    .upload-area-text { color:var(--text3); font-size:13px; }
    .upload-area-text span { color:var(--accent); }
    .upload-previews { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:12px; }
    .upload-preview { position:relative; width:70px; height:70px; border-radius:8px;
                      overflow:hidden; border:1px solid var(--border2); }
    .upload-preview img { width:100%; height:100%; object-fit:cover; }
    .upload-preview-remove { position:absolute; top:2px; left:2px; background:rgba(0,0,0,.7);
                             border:none; color:#fff; width:18px; height:18px; border-radius:4px;
                             cursor:pointer; font-size:12px; display:flex; align-items:center; justify-content:center; }
    .upload-btn { width:100%; padding:12px; background:var(--accent); color:#000; border:none;
                  border-radius:10px; cursor:pointer; font-weight:bold; font-size:14px;
                  font-family:'Courier New',monospace; transition:opacity .2s; }
    .upload-btn:hover { opacity:.85; }
    .upload-btn:disabled { background:var(--border2); color:var(--text3); cursor:not-allowed; }
    .uploading-text { text-align:center; color:var(--accent); font-size:13px; margin-top:8px; }
    .photos-grid { display:flex; flex-direction:column; gap:16px; }
    .photo-card { background:var(--bg3); border:1px solid var(--border); border-radius:14px; overflow:hidden; }
    .photo-card-header { padding:10px 14px; display:flex; justify-content:space-between; align-items:center; }
    .photo-uploader { font-size:13px; font-weight:bold; }
    .photo-time { font-size:11px; color:var(--text3); }
    .photo-img { width:100%; max-height:400px; object-fit:contain; background:var(--bg); cursor:pointer; display:block; }
    .photo-img:hover { opacity:.9; }
    .photo-actions { padding:10px 14px; display:flex; align-items:center; gap:10px; }
    .like-btn { background:transparent; border:1px solid var(--border2); border-radius:8px;
                padding:6px 14px; color:var(--text2); cursor:pointer; font-size:13px;
                font-family:'Courier New',monospace; display:flex; align-items:center; gap:6px; transition:all .2s; }
    .like-btn:hover,.like-btn.liked { border-color:#ff2d55; color:#ff2d55; }
    .like-btn.liked { background:rgba(255,45,85,.1); }
    .photo-delete-btn { background:transparent; border:1px solid var(--border2); border-radius:8px;
                        padding:6px 12px; color:var(--text3); cursor:pointer; font-size:12px;
                        font-family:'Courier New',monospace; transition:all .2s; margin-right:auto; }
    .photo-delete-btn:hover { border-color:#ff2d55; color:#ff2d55; background:rgba(255,45,85,.1); }
    .no-photos { text-align:center; padding:40px 0; color:var(--text4); font-size:14px; }
    .lightbox { position:fixed; inset:0; background:rgba(0,0,0,.95); display:flex;
                align-items:center; justify-content:center; z-index:9999; cursor:pointer; }
    .lightbox img { max-width:95vw; max-height:95vh; object-fit:contain; border-radius:8px; }

    /* ── DIFFICULTY ── */
    .difficulty-section { margin-bottom:24px; background:var(--bg3); border:1px solid var(--border);
                          border-radius:14px; padding:18px 20px; }
    .difficulty-section-title { font-size:12px; letter-spacing:2px; color:var(--text3); margin-bottom:14px;
                                 display:flex; align-items:center; justify-content:space-between; }
    .difficulty-avg-display { display:flex; align-items:baseline; gap:6px; margin-bottom:12px; }
    .difficulty-avg-number { font-size:36px; font-weight:bold; line-height:1; transition:color .4s; }
    .difficulty-avg-outof  { font-size:14px; color:var(--text3); }
    .difficulty-avg-voters { font-size:11px; color:var(--text4); margin-top:2px; }
    .difficulty-bar-bg { width:100%; height:6px; background:var(--border); border-radius:3px;
                         margin-bottom:16px; overflow:hidden; }
    .difficulty-bar-fill { height:100%; border-radius:3px; transition:width .5s cubic-bezier(.4,0,.2,1),background .4s; }
    .difficulty-buttons { display:flex; gap:6px; flex-wrap:wrap; }
    .diff-btn { flex:1; min-width:28px; padding:8px 4px; border-radius:8px; border:1px solid var(--border);
                background:var(--bg); color:var(--text3); cursor:pointer; font-size:13px; font-weight:bold;
                font-family:'Courier New',monospace; transition:all .18s; text-align:center; position:relative; }
    .diff-btn:hover { transform:translateY(-2px); }
    .diff-btn.selected { color:#000; font-weight:bold; transform:translateY(-2px); box-shadow:0 4px 12px rgba(0,0,0,.5); }
    .diff-btn.selected::after { content:'✓'; position:absolute; top:-6px; right:-4px; font-size:9px;
                                background:#fff; color:#000; border-radius:50%; width:12px; height:12px;
                                display:flex; align-items:center; justify-content:center; font-weight:bold; }
    .difficulty-login-hint { font-size:12px; color:var(--text4); text-align:center; margin-top:10px; }
    .difficulty-login-hint span { color:var(--accent); cursor:pointer; }
    .difficulty-voted-msg { font-size:11px; color:var(--text3); text-align:center; margin-top:10px; }
    .difficulty-divider { height:1px; background:var(--border); margin:20px 0; }

    /* ── SETTINGS DRAWER ── */
    .settings-drawer-overlay { position:fixed; inset:0; background:rgba(0,0,0,.5);
                                backdrop-filter:blur(6px); z-index:998;
                                opacity:0; pointer-events:none; transition:opacity .25s; }
    .settings-drawer-overlay.open { opacity:1; pointer-events:all; }
    .settings-drawer { position:fixed; top:0; left:0; height:100%; width:320px; max-width:90vw;
                       background:var(--bg2); border-right:1px solid var(--border2);
                       z-index:999; transform:translateX(-100%); transition:transform .28s cubic-bezier(.4,0,.2,1);
                       display:flex; flex-direction:column; overflow-y:auto; }
    body[dir=rtl] .settings-drawer { left:auto; right:0; border-right:none;
                                      border-left:1px solid var(--border2);
                                      transform:translateX(100%); }
    .settings-drawer.open { transform:translateX(0); }
    .drawer-header { padding:24px 20px 16px; border-bottom:1px solid var(--border); display:flex;
                     justify-content:space-between; align-items:center; flex-shrink:0; }
    .drawer-title { font-size:17px; font-weight:bold; }
    .drawer-close { background:transparent; border:1px solid var(--border2); color:var(--text3);
                    width:30px; height:30px; border-radius:8px; cursor:pointer; font-size:16px;
                    display:flex; align-items:center; justify-content:center; transition:all .2s; }
    .drawer-close:hover { border-color:var(--text); color:var(--text); }
    .drawer-section { padding:16px 20px; border-bottom:1px solid var(--border); }
    .drawer-section-label { font-size:10px; letter-spacing:2px; color:var(--text3);
                            margin-bottom:12px; text-transform:uppercase; }
    .drawer-row { display:flex; align-items:center; justify-content:space-between;
                  padding:10px 14px; background:var(--bg); border:1px solid var(--border);
                  border-radius:10px; margin-bottom:8px; cursor:pointer; transition:border-color .2s; }
    .drawer-row:last-child { margin-bottom:0; }
    .drawer-row:hover { border-color:var(--border2); }
    .drawer-row-left { display:flex; align-items:center; gap:10px; }
    .drawer-row-icon { font-size:16px; width:22px; text-align:center; }
    .drawer-row-label { font-size:13px; color:var(--text); }
    .drawer-row-sub { font-size:11px; color:var(--text3); margin-top:1px; }
    .drawer-row-right { color:var(--text3); font-size:12px; }
    /* theme toggle pill */
    .theme-toggle { display:flex; background:var(--bg); border:1px solid var(--border); border-radius:10px; overflow:hidden; }
    .theme-opt { flex:1; padding:9px 6px; text-align:center; font-size:12px; cursor:pointer;
                 transition:all .2s; color:var(--text3); font-family:'Courier New',monospace; }
    .theme-opt.active { background:var(--text); color:var(--bg); font-weight:bold; }
    /* admin section inside drawer */
    .drawer-admin-badge { display:inline-block; padding:2px 8px; border-radius:20px;
                          font-size:10px; background:rgba(255,45,85,.12); color:#ff2d55;
                          border:1px solid rgba(255,45,85,.3); margin-right:6px; }
    /* deadline colour settings inside drawer */
    .color-settings-wrap { padding:0; }
    .color-row { display:flex; align-items:center; gap:10px; padding:10px 0;
                 border-bottom:1px solid var(--border); }
    .color-row:last-child { border-bottom:none; }
    .color-dot { width:12px; height:12px; border-radius:50%; flex-shrink:0; }
    .color-row-label { flex:1; font-size:12px; color:var(--text2); }
    .color-row-label strong { display:block; font-size:13px; color:var(--text); margin-bottom:1px; }
    .color-input-wrap { display:flex; align-items:center; gap:5px; }
    .color-num { width:52px; padding:6px 8px; background:var(--bg2); border:1px solid var(--border2);
                 border-radius:8px; color:var(--text); font-size:13px; font-family:'Courier New',monospace;
                 outline:none; text-align:center; direction:ltr; }
    .color-num:focus { border-color:var(--text3); }
    .color-unit { font-size:11px; color:var(--text3); white-space:nowrap; }
    .color-preview-bar { display:flex; border-radius:8px; overflow:hidden; height:8px; margin:12px 0 4px; }
    .color-preview-seg { flex:1; transition:all .3s; }
    .color-preview-labels { display:flex; justify-content:space-between; font-size:10px; color:var(--text4); margin-bottom:8px; }
    .drawer-btn-row { display:flex; gap:8px; margin-top:4px; }
    .drawer-btn-sm { flex:1; padding:9px; background:transparent; border:1px solid var(--border2);
                     color:var(--text2); border-radius:8px; cursor:pointer; font-size:12px;
                     font-family:'Courier New',monospace; transition:all .2s; }
    .drawer-btn-sm:hover { border-color:var(--text); color:var(--text); }
    .drawer-btn-primary { flex:2; padding:9px; background:var(--text); color:var(--bg);
                          border:none; border-radius:8px; cursor:pointer; font-size:12px; font-weight:bold;
                          font-family:'Courier New',monospace; transition:opacity .2s; }
    .drawer-btn-primary:hover { opacity:.85; }

    /* deadline settings sub-panel (hidden until expanded) */
    .expandable { overflow:hidden; max-height:0; opacity:0; transition:max-height .3s ease,opacity .3s ease; }
    .expandable.open { max-height:600px; opacity:1; }

    /* settings rows */
    .settings-row { display:flex; align-items:center; gap:14px; padding:14px 16px; background:var(--bg);
                    border:1px solid var(--border); border-radius:12px; margin-bottom:10px; }
    .settings-color-dot { width:14px; height:14px; border-radius:50%; flex-shrink:0; }
    .settings-row-label { flex:1; font-size:13px; color:var(--text2); line-height:1.4; }
    .settings-row-label strong { display:block; color:var(--text); font-size:14px; margin-bottom:2px; }
    .settings-input-wrap { display:flex; align-items:center; gap:6px; }
    .settings-num { width:60px; padding:8px 10px; background:var(--bg2); border:1px solid var(--border2);
                    border-radius:8px; color:var(--text); font-size:14px; font-family:'Courier New',monospace;
                    outline:none; text-align:center; direction:ltr; }
    .settings-num:focus { border-color:var(--text3); }
    .settings-unit { font-size:12px; color:var(--text3); white-space:nowrap; }
    .settings-preview { display:flex; border-radius:10px; overflow:hidden; height:10px; margin:14px 0 4px; }
    .settings-preview-seg { flex:1; transition:background .3s; }
    .settings-preview-labels { display:flex; justify-content:space-between; font-size:10px; color:var(--text4); margin-bottom:16px; }
    .settings-reset { background:transparent; border:1px solid var(--border2); color:var(--text3);
                      padding:8px 14px; border-radius:8px; cursor:pointer; font-size:12px;
                      font-family:'Courier New',monospace; transition:all .2s; }
    .settings-reset:hover { border-color:var(--text2); color:var(--text2); }

    .hidden { display:none; }
    @keyframes fadeIn { from{opacity:0;transform:translateY(-8px)} to{opacity:1;transform:translateY(0)} }
    @media(max-width:500px){ header{padding:16px;flex-wrap:wrap;gap:10px} .card{padding:16px} .card-subject{font-size:15px} .form-row-2{flex-direction:column} }
  </style>
</head>
<body>

<header>
  <div>
    <div class="header-title-label" id="headerLabel"></div>
    <div class="header-title"       id="headerTitle"></div>
  </div>
  <div class="header-actions">
    <span class="user-badge hidden" id="userBadge"></span>
    <button class="btn-gear" id="settingsBtn" onclick="openDrawer()">⚙️</button>
  </div>
</header>

<main>
  <button class="add-btn-dashed hidden" id="addBtn" onclick="showAddForm()"></button>
  <div class="add-form hidden" id="addForm">
    <div class="form-title" id="formTitle"></div>
    <input type="text" id="subjectInput"/>
    <input type="text" id="pagesInput"/>
    <div class="form-row-2">
      <div><div class="input-label" id="labelDueDate"></div><input type="date" id="dateInput"/></div>
      <div><div class="input-label" id="labelDueTime"></div><input type="time" id="timeInput"/></div>
    </div>
    <div class="checkbox-row" id="checkboxRow" onclick="toggleQuestions()">
      <div class="custom-checkbox" id="customCheckbox"></div>
      <span class="checkbox-label" id="checkboxLabel"></span>
    </div>
    <div class="questions-box" id="questionsBox">
      <textarea id="questionsInput"></textarea>
    </div>
    <div class="form-row">
      <button class="btn-full" id="btnAddCard" style="flex:1;margin-top:0" onclick="addCard()"></button>
      <button class="btn-cancel" id="btnCancelForm" onclick="hideAddForm()"></button>
    </div>
  </div>
  <div class="cards-list" id="cardsList"></div>
  <div class="empty hidden" id="emptyState">
    <div class="empty-emoji" id="emptyEmoji"></div>
    <div class="empty-text"  id="emptyText"></div>
    <div class="empty-sub"   id="emptySub"></div>
  </div>
  <div class="total-count hidden" id="totalCount"></div>
  <div class="credit hidden" id="credit"></div>
</main>

<!-- ══ SETTINGS DRAWER ══ -->
<div class="settings-drawer-overlay" id="drawerOverlay" onclick="closeDrawer()"></div>
<div class="settings-drawer" id="settingsDrawer">
  <div class="drawer-header">
    <div class="drawer-title" id="drawerTitle"></div>
    <button class="drawer-close" onclick="closeDrawer()">✕</button>
  </div>

  <!-- ACCOUNT SECTION -->
  <div class="drawer-section" id="drawerAccountSection">
    <div class="drawer-section-label" id="drawerAccountLabel"></div>
    <!-- Logged-in state -->
    <div id="drawerLoggedIn" class="hidden">
      <div class="drawer-row" style="cursor:default">
        <div class="drawer-row-left">
          <span class="drawer-row-icon">👤</span>
          <div><div class="drawer-row-label" id="drawerUsername"></div>
               <div class="drawer-row-sub"  id="drawerEmail"></div></div>
        </div>
      </div>
      <div class="drawer-row" onclick="logout()" style="margin-top:4px">
        <div class="drawer-row-left">
          <span class="drawer-row-icon">🚪</span>
          <div class="drawer-row-label" id="drawerLogoutLabel"></div>
        </div>
        <span class="drawer-row-right">›</span>
      </div>
    </div>
    <!-- Logged-out state -->
    <div id="drawerLoggedOut">
      <div class="drawer-row" onclick="openAuthFromDrawer()">
        <div class="drawer-row-left">
          <span class="drawer-row-icon">🔑</span>
          <div><div class="drawer-row-label" id="drawerLoginLabel"></div>
               <div class="drawer-row-sub"  id="drawerLoginSub"></div></div>
        </div>
        <span class="drawer-row-right">›</span>
      </div>
    </div>
  </div>

  <!-- THEME SECTION -->
  <div class="drawer-section">
    <div class="drawer-section-label" id="drawerThemeLabel"></div>
    <div class="theme-toggle">
      <div class="theme-opt" id="themeDark"  onclick="setTheme('dark')"></div>
      <div class="theme-opt" id="themeLight" onclick="setTheme('light')"></div>
    </div>
  </div>

  <!-- LEADERBOARD SHORTCUT -->
  <div class="drawer-section">
    <div class="drawer-section-label" id="drawerMoreLabel"></div>
    <div class="drawer-row" onclick="closeDrawer();openLeaderboard()">
      <div class="drawer-row-left">
        <span class="drawer-row-icon">🏆</span>
        <div class="drawer-row-label" id="drawerLeaderboardLabel"></div>
      </div>
      <span class="drawer-row-right">›</span>
    </div>
  </div>

  <!-- DEADLINE COLOURS SECTION -->
  <div class="drawer-section">
    <div class="drawer-section-label" id="drawerColorsLabel"></div>
    <div class="settings-preview">
      <div class="settings-preview-seg" id="prev-red"></div>
      <div class="settings-preview-seg" id="prev-orange"></div>
      <div class="settings-preview-seg" id="prev-green"></div>
      <div class="settings-preview-seg" id="prev-blue"></div>
    </div>
    <div class="settings-preview-labels">
      <span id="prevLabelNow"></span><span id="prevLabelRed"></span>
      <span id="prevLabelOrange"></span><span id="prevLabelGreen"></span>
      <span id="prevLabelFar"></span>
    </div>
    <div class="settings-row">
      <div class="settings-color-dot" style="background:#ff2d55;box-shadow:0 0 6px #ff2d5588"></div>
      <div class="settings-row-label"><strong id="settingsRedLabel" style="color:#ff2d55"></strong><span id="settingsLessThan1"></span></div>
      <div class="settings-input-wrap">
        <input class="settings-num" type="number" id="st-red" min="1" max="999" oninput="updateSettingsPreview()"/>
        <span class="settings-unit" id="settingsUnitHours"></span>
      </div>
    </div>
    <div class="settings-row">
      <div class="settings-color-dot" style="background:#ff9f0a;box-shadow:0 0 6px #ff9f0a88"></div>
      <div class="settings-row-label"><strong id="settingsOrangeLabel" style="color:#ff9f0a"></strong><span id="settingsLessThan2"></span></div>
      <div class="settings-input-wrap">
        <input class="settings-num" type="number" id="st-orange" min="1" max="999" oninput="updateSettingsPreview()"/>
        <span class="settings-unit" id="settingsUnitDays1"></span>
      </div>
    </div>
    <div class="settings-row">
      <div class="settings-color-dot" style="background:#30d158;box-shadow:0 0 6px #30d15888"></div>
      <div class="settings-row-label"><strong id="settingsGreenLabel" style="color:#30d158"></strong><span id="settingsLessThan3"></span></div>
      <div class="settings-input-wrap">
        <input class="settings-num" type="number" id="st-green" min="1" max="999" oninput="updateSettingsPreview()"/>
        <span class="settings-unit" id="settingsUnitDays2"></span>
      </div>
    </div>
    <div class="settings-row" style="opacity:.5">
      <div class="settings-color-dot" style="background:#64d2ff"></div>
      <div class="settings-row-label"><strong id="settingsBlueLabel" style="color:#64d2ff"></strong><span id="settingsBlueDesc"></span></div>
    </div>
    <div class="modal-error hidden" id="settingsError"></div>
    <div class="drawer-btn-row" style="margin-top:12px">
      <button class="settings-reset" id="settingsResetBtn" onclick="resetSettings()"></button>
      <button class="drawer-btn-primary" id="settingsSaveBtn" onclick="saveSettings()"></button>
    </div>
  </div>

  <!-- ADMIN SECTION -->
  <div class="drawer-section" id="drawerAdminSection">
    <div class="drawer-section-label" id="drawerAdminLabel"></div>
    <!-- Not admin -->
    <div id="drawerAdminLogin">
      <div class="drawer-row" onclick="showDrawerAdminForm()">
        <div class="drawer-row-left">
          <span class="drawer-row-icon">🔐</span>
          <div><div class="drawer-row-label" id="drawerAdminLoginLabel"></div>
               <div class="drawer-row-sub"  id="drawerAdminLoginSub"></div></div>
        </div>
        <span class="drawer-row-right">›</span>
      </div>
      <div id="drawerAdminForm" class="hidden" style="margin-top:10px">
        <input type="password" id="adminPassInput" style="margin-bottom:8px" onkeydown="if(event.key==='Enter')doAdminLogin()"/>
        <div class="modal-error hidden" id="adminPassError"></div>
        <button class="btn-full" id="adminLoginSubmitBtn" onclick="doAdminLogin()" style="margin-top:0"></button>
      </div>
    </div>
    <!-- Is admin -->
    <div id="drawerAdminActive" class="hidden">
      <div class="drawer-row" style="cursor:default;border-color:#ff2d5544;background:rgba(255,45,85,.05)">
        <div class="drawer-row-left">
          <span class="drawer-row-icon">✅</span>
          <div class="drawer-row-label" id="drawerAdminActiveLabel"></div>
        </div>
      </div>
      <div class="drawer-row" onclick="exitAdmin()" style="margin-top:4px">
        <div class="drawer-row-left">
          <span class="drawer-row-icon">🚪</span>
          <div class="drawer-row-label" id="drawerAdminExitLabel"></div>
        </div>
        <span class="drawer-row-right">›</span>
      </div>
    </div>
  </div>
</div>

<!-- ══ AUTH MODAL ══ -->
<div class="modal-overlay hidden" id="authModal">
  <div class="modal">
    <div id="loginView">
      <div class="modal-title" id="loginTitle"></div>
      <div class="modal-sub"   id="loginSub"></div>
      <button class="btn-google" id="googleLoginBtn" onclick="signInWithGoogle()"></button>
      <div class="auth-divider"><div class="auth-divider-line"></div><span class="auth-divider-text" id="authDividerText"></span><div class="auth-divider-line"></div></div>
      <div class="field-group"><input type="email"    id="loginEmail"/></div>
      <div class="field-group"><input type="password" id="loginPass"  onkeydown="if(event.key==='Enter')doUserLogin()"/></div>
      <div class="modal-error hidden" id="loginError"></div>
      <button class="btn-full" id="loginSubmitBtn" onclick="doUserLogin()"></button>
      <div class="modal-link" id="switchToRegisterLink" onclick="switchToRegister()"></div>
      <div style="text-align:center;margin-top:10px"><span style="color:var(--text4);font-size:12px;cursor:pointer" onclick="closeAuthModal()" id="cancelLoginLink"></span></div>
    </div>
    <div id="registerView" class="hidden">
      <div class="modal-title" id="registerTitle"></div>
      <div class="modal-sub"   id="registerSub"></div>
      <button class="btn-google" id="googleRegisterBtn" onclick="signInWithGoogle()"></button>
      <div class="auth-divider"><div class="auth-divider-line"></div><span class="auth-divider-text" id="authDividerText2"></span><div class="auth-divider-line"></div></div>
      <div class="field-group"><input type="text"     id="regUser"/></div>
      <div class="field-group"><input type="email"    id="regEmail"/></div>
      <div class="field-group"><input type="password" id="regPass"/></div>
      <div class="field-group"><input type="password" id="regPass2" onkeydown="if(event.key==='Enter')doRegister()"/></div>
      <div class="modal-error hidden" id="registerError"></div>
      <button class="btn-full" id="registerSubmitBtn" onclick="doRegister()"></button>
      <div class="modal-link" id="switchToLoginLink" onclick="switchToLogin()"></div>
      <div style="text-align:center;margin-top:10px"><span style="color:var(--text4);font-size:12px;cursor:pointer" onclick="closeAuthModal()" id="cancelRegLink"></span></div>
    </div>
    <div id="verifyView" class="hidden">
      <div class="verify-box">
        <div class="verify-icon"  id="verifyIcon"></div>
        <div class="verify-title" id="verifyTitle"></div>
        <div class="verify-sub">
          <span id="verifySentLabel"></span><br>
          <span class="verify-email-highlight" id="verifyEmailDisplay"></span><br><br>
          <span id="verifyClickLabel"></span><br>
          <span id="verifySpamNote" style="font-size:11px;color:var(--text4)"></span>
        </div>
        <div id="resendArea" style="margin-top:16px">
          <span class="resend-link" id="resendLink" onclick="resendVerification()"></span>
          <span class="hidden resend-cooldown" id="resendCooldown"></span>
          <span class="hidden resend-success"  id="resendSuccess"></span>
        </div>
        <div class="modal-divider"></div>
        <div class="modal-link" id="backToLoginLink" onclick="switchToLogin()"></div>
      </div>
    </div>
  </div>
</div>

<!-- ══ GOOGLE USERNAME MODAL ══ -->
<div class="modal-overlay hidden" id="usernameModal">
  <div class="modal">
    <div class="modal-title" id="usernameModalTitle"></div>
    <div class="modal-sub"   id="usernameModalSub"></div>
    <div class="field-group"><input type="text" id="googleUsernameInput" onkeydown="if(event.key==='Enter')saveGoogleUsername()"/></div>
    <div class="modal-error hidden" id="usernameError"></div>
    <button class="btn-full" id="usernameSubmitBtn" onclick="saveGoogleUsername()"></button>
  </div>
</div>

<!-- ══ ANSWERS MODAL ══ -->
<div class="modal-overlay hidden" id="answersModal">
  <div class="answers-modal">
    <div class="answers-header">
      <div>
        <div class="answers-title"   id="answersTitle"></div>
        <div class="answers-subject" id="answersSubject"></div>
      </div>
      <button class="close-btn" onclick="closeAnswers()">&#215;</button>
    </div>
    <div class="answers-body">
      <div class="difficulty-section">
        <div class="difficulty-section-title">
          <span id="diffSectionTitle"></span>
          <span id="diffVotersCount" style="color:var(--text4);font-size:11px"></span>
        </div>
        <div style="display:flex;align-items:flex-end;gap:12px;margin-bottom:12px">
          <div>
            <div class="difficulty-avg-display">
              <span class="difficulty-avg-number" id="diffAvgNumber">—</span>
              <span class="difficulty-avg-outof">/10</span>
            </div>
            <div class="difficulty-avg-voters" id="diffAvgSub"></div>
          </div>
          <div style="flex:1;padding-bottom:6px">
            <div class="difficulty-bar-bg"><div class="difficulty-bar-fill" id="diffBarFill" style="width:0%;background:#444"></div></div>
          </div>
        </div>
        <div class="difficulty-buttons" id="diffButtons"></div>
        <div class="difficulty-login-hint hidden" id="diffLoginHint"></div>
        <div class="difficulty-voted-msg  hidden" id="diffVotedMsg"></div>
      </div>
      <div class="difficulty-divider"></div>
      <div id="uploadSection">
        <div class="upload-area" onclick="document.getElementById('fileInput').click()">
          <input type="file" id="fileInput" accept="image/*" multiple onchange="handleFiles(event)"/>
          <div class="upload-area-text" id="uploadAreaText"></div>
        </div>
        <div class="upload-previews" id="uploadPreviews"></div>
        <button class="upload-btn" id="uploadBtn" onclick="uploadPhotos()" disabled></button>
        <div class="uploading-text hidden" id="uploadingText"></div>
      </div>
      <div style="margin-top:24px">
        <div id="uploadedSectionHeader" style="font-size:12px;color:var(--text4);margin-bottom:12px;letter-spacing:1px"></div>
        <div class="photos-grid" id="photosGrid"></div>
        <div class="no-photos hidden" id="noPhotos"></div>
      </div>
    </div>
  </div>
</div>

<!-- ══ LEADERBOARD MODAL ══ -->
<div class="modal-overlay hidden" id="leaderboardModal" onclick="closeLeaderboard(event)">
  <div class="modal" style="max-width:420px" onclick="event.stopPropagation()">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
      <div class="modal-title" id="leaderboardTitle"></div>
      <button class="close-btn" onclick="closeLeaderboard()">&#215;</button>

</div>

      try {
        const doc = await db.collection("users").doc(fu.uid).get();
        currentUser = doc.exists
          ? { username:doc.data().username, uid:fu.uid, email:fu.email }
          : { username:fu.email.split("@")[0], uid:fu.uid, email:fu.email };
      } catch(e) {
        currentUser = { username:fu.email.split("@")[0], uid:fu.uid, email:fu.email };
      }
    } else { currentUser = null; }
    updateDrawerAccountUI();
  });
  function isGoogleProvider(u){ return u.providerData&&u.providerData.some(p=>p.providerId==="google.com"); }

  // ══ GOOGLE SIGN-IN ══
  async function signInWithGoogle(){
    const provider=new firebase.auth.GoogleAuthProvider();
    setGBtns(true); clearErr("loginError"); clearErr("registerError");
    try {
      const cred=await auth.signInWithPopup(provider), fu=cred.user;
      const doc=await db.collection("users").doc(fu.uid).get();
      if(doc.exists){
        currentUser={username:doc.data().username,uid:fu.uid,email:fu.email};
        updateDrawerAccountUI(); closeAuthModal();
        if(currentCardId) openAnswers(currentCardId);
      } else {
        pendingGoogleFirebaseUser=fu; closeAuthModal();
        document.getElementById("usernameModal").classList.remove("hidden");
        setTimeout(()=>document.getElementById("googleUsernameInput").focus(),100);
      }
    } catch(err){
      if(err.code!=="auth/popup-closed-by-user"){
        const el=document.getElementById("loginView").classList.contains("hidden")
          ?document.getElementById("registerError"):document.getElementById("loginError");
        showErr(el,translateFirebaseError(err.code));
      }
    }
    setGBtns(false);
  }

  // ══ GOOGLE USERNAME ══
  async function saveGoogleUsername(){
    const un=document.getElementById("googleUsernameInput").value.trim();
    const errEl=document.getElementById("usernameError"), btn=document.getElementById("usernameSubmitBtn");
    clearErr("usernameError");
    if(!un){showErr(errEl,TEXT.errUsernameEmpty);return;}
    if(un.length<2){showErr(errEl,TEXT.errUsernameTooShort);return;}
    const ud=await db.collection("usernames").doc(un).get();
    if(ud.exists){showErr(errEl,TEXT.errUsernameTaken);return;}
    btn.disabled=true; btn.textContent=TEXT.usernameSaving;
    try{
      const uid=pendingGoogleFirebaseUser.uid, email=pendingGoogleFirebaseUser.email;
      await db.collection("users").doc(uid).set({username:un,email});
      await db.collection("usernames").doc(un).set({uid});
      currentUser={username:un,uid,email}; updateDrawerAccountUI();
      document.getElementById("usernameModal").classList.add("hidden");
      document.getElementById("googleUsernameInput").value=""; pendingGoogleFirebaseUser=null;
      if(currentCardId) openAnswers(currentCardId);
    }catch(err){showErr(errEl,TEXT.errSaveFailed+err.message);}
    btn.disabled=false; btn.textContent=TEXT.btnUsernameSave;
  }

  // ══ REGISTER ══
  async function doRegister(){
    const un=document.getElementById("regUser").value.trim(), email=document.getElementById("regEmail").value.trim();
    const pass=document.getElementById("regPass").value, pass2=document.getElementById("regPass2").value;
    const errEl=document.getElementById("registerError"), btn=document.getElementById("registerSubmitBtn");
    clearErr("registerError");
    if(!un||!email||!pass||!pass2){showErr(errEl,TEXT.errFillAll);return;}
    if(un.length<2){showErr(errEl,TEXT.errUsernameTooShort);return;}
    if(pass!==pass2){showErr(errEl,TEXT.errPasswordMismatch);return;}
    if(pass.length<6){showErr(errEl,TEXT.errPasswordTooShort);return;}
    const ud=await db.collection("usernames").doc(un).get();
    if(ud.exists){showErr(errEl,TEXT.errUsernameTaken);return;}
    btn.disabled=true; btn.textContent=TEXT.registerBusy;
    try{
      const cred=await auth.createUserWithEmailAndPassword(email,pass);
      await db.collection("users").doc(cred.user.uid).set({username:un,email});
      await db.collection("usernames").doc(un).set({uid:cred.user.uid});
      await cred.user.sendEmailVerification();
      pendingVerifyEmail=email; pendingVerifyPass=pass;
      await auth.signOut(); switchToVerify(email);
    }catch(err){showErr(errEl,translateFirebaseError(err.code));}
    btn.disabled=false; btn.textContent=TEXT.btnRegisterSubmit;
  }

  // ══ LOGIN ══
  async function doUserLogin(){
    const email=document.getElementById("loginEmail").value.trim(), pass=document.getElementById("loginPass").value;
    const errEl=document.getElementById("loginError"), btn=document.getElementById("loginSubmitBtn");
    clearErr("loginError");
    if(!email||!pass){showErr(errEl,TEXT.errFillAll);return;}
    btn.disabled=true; btn.textContent=TEXT.loginBusy;
    try{
      const cred=await auth.signInWithEmailAndPassword(email,pass);
      if(!cred.user.emailVerified){
        pendingVerifyEmail=email; pendingVerifyPass=pass; await auth.signOut(); switchToVerify(email);
      } else { closeAuthModal(); if(currentCardId) openAnswers(currentCardId); }
    }catch(err){showErr(errEl,translateFirebaseError(err.code));}
    btn.disabled=false; btn.textContent=TEXT.btnLoginSubmit;
  }

  // ══ RESEND VERIFICATION ══
  async function resendVerification(){
    const lnk=document.getElementById("resendLink"), cool=document.getElementById("resendCooldown"), suc=document.getElementById("resendSuccess");
    if(!pendingVerifyEmail||!pendingVerifyPass){suc.textContent=TEXT.resendNoCreds;suc.classList.remove("hidden");lnk.classList.add("hidden");return;}
    lnk.classList.add("hidden"); cool.textContent=TEXT.resendSending; cool.classList.remove("hidden"); suc.classList.add("hidden");
    try{
      const cred=await auth.signInWithEmailAndPassword(pendingVerifyEmail,pendingVerifyPass);
      await cred.user.sendEmailVerification(); await auth.signOut();
      cool.classList.add("hidden"); suc.textContent=TEXT.resendSuccess; suc.classList.remove("hidden");
      let t=60; const timer=setInterval(()=>{if(--t<=0){clearInterval(timer);suc.classList.add("hidden");lnk.classList.remove("hidden");}},1000);
    }catch(err){cool.classList.add("hidden");suc.textContent=TEXT.resendError;suc.classList.remove("hidden");setTimeout(()=>{suc.classList.add("hidden");lnk.classList.remove("hidden");},3000);}
  }

    const dueDate=document.getElementById("dateInput").value;
    const dueTime=document.getElementById("timeInput").value||"";

  let colorSettings=(()=>{try{const s=localStorage.getItem("hwColorSettings");if(s)return{...DEFAULT_SETTINGS,...JSON.parse(s)};}catch(e){}return{...DEFAULT_SETTINGS};})();

  function updateSettingsPreview(){
    const rH=Math.max(1,parseFloat(document.getElementById("st-red").value)||DEFAULT_SETTINGS.redHours);
    const oD=Math.max(1,parseFloat(document.getElementById("st-orange").value)||DEFAULT_SETTINGS.orangeDays);
    const gD=Math.max(1,parseFloat(document.getElementById("st-green").value)||DEFAULT_SETTINGS.greenDays);
    const total=gD*1.5;
    const rW=Math.min((rH/24)/total*100,33), oW=Math.min(((oD-rH/24)/total)*100,33), gW=Math.min(((gD-oD)/total)*100,34), bW=100-rW-oW-gW;
    document.getElementById("prev-red").style.cssText=`background:#ff2d55;flex:${rW}`;
    document.getElementById("prev-orange").style.cssText=`background:#ff9f0a;flex:${Math.max(oW,0)}`;
    document.getElementById("prev-green").style.cssText=`background:#30d158;flex:${Math.max(gW,0)}`;
    document.getElementById("prev-blue").style.cssText=`background:#64d2ff;flex:${Math.max(bW,0)}`;
    document.getElementById("prevLabelRed").textContent=rH+TEXT.settingsHoursAbbr;
    document.getElementById("prevLabelOrange").textContent=oD+TEXT.settingsDaysAbbr;
    document.getElementById("prevLabelGreen").textContent=gD+TEXT.settingsDaysAbbr;
  }
  function saveSettings(){
    const rH=parseFloat(document.getElementById("st-red").value);
    const oD=parseFloat(document.getElementById("st-orange").value);
    const gD=parseFloat(document.getElementById("st-green").value);
    const errEl=document.getElementById("settingsError"); clearErr("settingsError");
    if(!rH||!oD||!gD||rH<1||oD<1||gD<1){showErr(errEl,TEXT.errSettingsMinOne);return;}
    if(rH/24>=oD){showErr(errEl,TEXT.errSettingsOrangeGtRed);return;}
    if(oD>=gD){showErr(errEl,TEXT.errSettingsGreenGtOrange);return;}
    colorSettings={redHours:rH,orangeDays:oD,greenDays:gD};
    localStorage.setItem("hwColorSettings",JSON.stringify(colorSettings));
    closeDrawer(); render();
  }
  function resetSettings(){
    colorSettings={...DEFAULT_SETTINGS};
    localStorage.removeItem("hwColorSettings");
    document.getElementById("st-red").value=DEFAULT_SETTINGS.redHours;
    document.getElementById("st-orange").value=DEFAULT_SETTINGS.orangeDays;
    document.getElementById("st-green").value=DEFAULT_SETTINGS.greenDays;
    updateSettingsPreview(); clearErr("settingsError");
  }

  // ══ RENDER ══
  function getMinutesUntil(d,t){return Math.round((new Date(`${d}T${t||"23:59"}:00`)-new Date())/60000);}
  function getUrgency(min){
    const {redHours,orangeDays,greenDays}=colorSettings, h=min/60, d=min/1440;
    if(min<0)         return{label:TEXT.urgencyExpired,                                color:"#ff2d55",bg:"#2a0a10",border:"#ff2d55",  glow:"0 0 20px #ff2d5566"};
    if(h<redHours)    return{label:TEXT.urgencyRed.replace("{h}",redHours),            color:"#ff2d55",bg:"#2a0a10",border:"#ff2d55",  glow:"0 0 20px #ff2d5566"};
    if(d<orangeDays)  return{label:TEXT.urgencyOrange.replace("{h}",Math.round(h)),    color:"#ff9f0a",bg:"#201500",border:"#ff9f0a",  glow:"0 0 15px #ff9f0a44"};
    if(d<greenDays)   return{label:TEXT.urgencyGreen.replace("{d}",Math.floor(d)),     color:"#30d158",bg:"#0a1f10",border:"#30d158",  glow:"0 0 15px #30d15833"};
    return              {label:TEXT.urgencyBlue.replace("{d}",Math.floor(d)),          color:"#64d2ff",bg:"#001a2a",border:"#64d2ff44",glow:"none"};
  }
  function formatDate(dd,dt){
    const d=new Date(`${dd}T${dt||"23:59"}:00`), p=d.toLocaleDateString("he-IL",{weekday:"short",month:"short",day:"numeric"});
    return dt?p+" · "+dt:p;
  }

  const cardDiffCache={};
  function watchCardDiff(id){
    if(cardDiffCache[id]?.unsub) return;
    cardDiffCache[id]={avg:null,count:0,unsub:null};
    cardDiffCache[id].unsub=db.collection("homework").doc(id).collection("votes").doc("data").onSnapshot(doc=>{
      const v=doc.exists?(doc.data().votes||{}):{}, vals=Object.values(v), cnt=vals.length;
      const avg=cnt>0?vals.reduce((a,b)=>a+b,0)/cnt:null;
      cardDiffCache[id].avg=avg?Math.round(avg*10)/10:null; cardDiffCache[id].count=cnt; render();
    });
  }
  function getDiffColor(s){if(!s||s===0)return"#444";if(s<=3)return"#30d158";if(s<=5)return"#64d2ff";if(s<=7)return"#ff9f0a";if(s<=9)return"#ff6b35";return"#ff2d55";}
  function getDiffLabel(s){if(!s||s===0)return"";if(s<=2)return TEXT.diffLabels.veryEasy;if(s<=4)return TEXT.diffLabels.easy;if(s<=6)return TEXT.diffLabels.medium;if(s<=8)return TEXT.diffLabels.hard;if(s<=9)return TEXT.diffLabels.veryHard;return TEXT.diffLabels.impossible;}

  function render(){
    const list=document.getElementById("cardsList"), empty=document.getElementById("emptyState");
    const total=document.getElementById("totalCount"), credit=document.getElementById("credit");
    list.innerHTML="";
    const sorted=[...cards].sort((a,b)=>new Date(`${a.dueDate}T${a.dueTime||"23:59"}`)-new Date(`${b.dueDate}T${b.dueTime||"23:59"}`));
    if(!sorted.length){empty.classList.remove("hidden");total.classList.add("hidden");credit.classList.add("hidden");return;}
    empty.classList.add("hidden");total.classList.remove("hidden");credit.classList.remove("hidden");
    total.textContent=TEXT.totalCount.replace("{n}",sorted.length);
    sorted.forEach((card,i)=>{
      const mins=getMinutesUntil(card.dueDate,card.dueTime), u=getUrgency(mins);
      watchCardDiff(card.id);
      const dd=cardDiffCache[card.id];
      let diffHTML=dd&&dd.count>0?`<div class="card-difficulty-badge" style="color:${getDiffColor(dd.avg)};border-color:${getDiffColor(dd.avg)}33">🔥 קושי ${dd.avg}/10 · ${getDiffLabel(dd.avg)}</div>`
                  :dd?`<div class="card-difficulty-badge" style="color:var(--text4)">${TEXT.cardNotRated}</div>`:"";
      const qHTML=card.questions?`<div class="card-questions"><span class="card-questions-label">${TEXT.cardQuestionsLabel}</span>${card.questions}</div>`:"";
      const div=document.createElement("div");
      div.className="card"; div.style.cssText=`background:${u.bg};border:1px solid ${u.border};box-shadow:${u.glow}`;
      div.onclick=e=>{if(!e.target.classList.contains("delete-btn")&&!e.target.closest(".delete-btn"))handleCardClick(card.id);};
      div.innerHTML=`<div class="card-number" style="border:1px solid ${u.color}44;color:${u.color}">#${i+1}</div>
        <div class="card-info">
          <div class="card-subject">${card.subject}</div>
          <div class="card-pages">${TEXT.cardPagesPrefix} <span>${card.pages}</span></div>
          ${qHTML}${diffHTML}
          <div class="card-hint">${TEXT.cardHint}</div>
        </div>
        <div class="card-due ${isAdmin?"has-delete":""}">
          <div class="card-urgency" style="color:${u.color}">${u.label}</div>
          <div class="card-date">${formatDate(card.dueDate,card.dueTime)}</div>
        </div>
        ${isAdmin?`<button class="delete-btn" onclick="deleteCard('${card.id}')">&#215;</button>`:""}`;
      list.appendChild(div);
    });
  }

  db.collection("homework").orderBy("dueDate").onSnapshot(snap=>{cards=snap.docs.map(d=>({id:d.id,...d.data()}));render();});

  // ══ ANSWERS MODAL ══
  function handleCardClick(id){ if(!currentUser){currentCardId=id;openAuthModal();return;} openAnswers(id); }
  function openAnswers(id){
    currentCardId=id; const card=cards.find(c=>c.id===id);
    document.getElementById("answersSubject").textContent=card?card.subject+TEXT.answersSubjectSep+card.pages:"";
    document.getElementById("answersModal").classList.remove("hidden");
    pendingFiles=[]; renderPreviews(); document.getElementById("uploadBtn").disabled=true;
    document.getElementById("uploadingText").classList.add("hidden");
    loadPhotos(id); loadDiffVotes(id);
  }
  function closeAnswers(){
    document.getElementById("answersModal").classList.add("hidden");
    if(photosUnsubscribe){photosUnsubscribe();photosUnsubscribe=null;}
    if(diffUnsubscribe){diffUnsubscribe();diffUnsubscribe=null;}
    currentCardId=null; document.getElementById("fileInput").value=""; pendingFiles=[]; renderPreviews();
  }
  function loadPhotos(id){
    if(photosUnsubscribe) photosUnsubscribe();
    const grid=document.getElementById("photosGrid"), np=document.getElementById("noPhotos");
    grid.innerHTML=`<div style="text-align:center;color:var(--text4);font-size:13px;padding:20px">${TEXT.leaderboardLoading}</div>`;
    np.classList.add("hidden");
    photosUnsubscribe=db.collection("homework").doc(id).collection("photos").orderBy("timestamp","desc").onSnapshot(snap=>{
      const posts=snap.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>(b.likes?.length||0)-(a.likes?.length||0));
      grid.innerHTML="";
      if(!posts.length){np.classList.remove("hidden");return;}
      np.classList.add("hidden");
      posts.forEach(post=>{
        const liked=currentUser&&post.likes?.includes(currentUser.username), lc=post.likes?.length||0;
        const time=post.timestamp?new Date(post.timestamp.toDate()).toLocaleDateString("he-IL",{day:"numeric",month:"short",hour:"2-digit",minute:"2-digit"}):"";
        const urls=post.urls||(post.url?[post.url]:[]);
        const imgs=urls.map(u=>`<img class="photo-img" src="${u}" loading="lazy" onclick="openLightbox('${u}')"/>`).join('<div style="height:2px;background:var(--bg)"></div>');
        const div=document.createElement("div"); div.className="photo-card";
        div.innerHTML=`<div class="photo-card-header"><span class="photo-uploader">${TEXT.photoUploaderIcon}${post.uploader}</span><span class="photo-time">${time}${urls.length>1?` · ${urls.length} ${TEXT.photoCountSuffix}`:""}</span></div>
          ${imgs}
          <div class="photo-actions">
            <button class="like-btn ${liked?"liked":""}" onclick="toggleLike('${post.id}')">❤️ ${lc>0?lc:TEXT.photoLikeDefault}</button>
            ${isAdmin?`<button class="photo-delete-btn" onclick="deletePhoto('${post.id}')">${TEXT.btnPhotoDelete}</button>`:""}
          </div>`;
        grid.appendChild(div);
      });
    });
  }
  async function deletePhoto(pid){ if(!isAdmin)return; if(confirm(TEXT.confirmDeletePhoto)) await db.collection("homework").doc(currentCardId).collection("photos").doc(pid).delete(); }
  async function toggleLike(pid){
    if(!currentUser)return;
    const ref=db.collection("homework").doc(currentCardId).collection("photos").doc(pid);
    const doc=await ref.get(); if(!doc.exists)return;
    const likes=doc.data().likes||[], un=currentUser.username;
    await ref.update({likes:likes.includes(un)?likes.filter(u=>u!==un):[...likes,un]});
  }

  // ══ DIFFICULTY ══
  function renderDiffButtons(myVote){
    const cont=document.getElementById("diffButtons"); cont.innerHTML="";
    for(let i=1;i<=10;i++){
      const btn=document.createElement("button"), color=getDiffColor(i);
      btn.className="diff-btn"+(myVote===i?" selected":""); btn.textContent=i;
      if(myVote===i){btn.style.background=color;btn.style.borderColor=color;btn.style.color="#000";}
      else{btn.style.borderColor=color+"44";btn.style.color=color+"99";}
      btn.onmouseenter=()=>{if(myVote!==i){btn.style.borderColor=color;btn.style.color=color;}};
      btn.onmouseleave=()=>{if(myVote!==i){btn.style.borderColor=color+"44";btn.style.color=color+"99";}};
      btn.onclick=()=>submitDiffVote(i); cont.appendChild(btn);
    }
    const hint=document.getElementById("diffLoginHint"), voted=document.getElementById("diffVotedMsg");
    if(!currentUser){hint.classList.remove("hidden");voted.classList.add("hidden");cont.style.opacity="0.4";cont.style.pointerEvents="none";}
    else{hint.classList.add("hidden");cont.style.opacity="1";cont.style.pointerEvents="auto";
      if(myVote){voted.textContent=TEXT.diffVotedMsg.replace("{v}",myVote);voted.classList.remove("hidden");}
      else voted.classList.add("hidden");}
  }
  function updateDiffDisplay(votes){
    const vals=Object.values(votes), cnt=vals.length, avg=cnt>0?vals.reduce((a,b)=>a+b,0)/cnt:0;
    const ar=cnt>0?Math.round(avg*10)/10:null, color=getDiffColor(ar);
    const ne=document.getElementById("diffAvgNumber"), se=document.getElementById("diffAvgSub");
    const be=document.getElementById("diffBarFill"), ve=document.getElementById("diffVotersCount");
    if(ar!==null){ne.textContent=ar;ne.style.color=color;se.textContent=getDiffLabel(ar);se.style.color=color+"99";be.style.width=(avg/10*100)+"%";be.style.background=color;ve.textContent=cnt+" "+TEXT.diffVotesSuffix;}
    else{ne.textContent="—";ne.style.color="#444";se.textContent=TEXT.diffNoVotes;se.style.color="var(--text4)";be.style.width="0%";ve.textContent="";}
  }
  function loadDiffVotes(id){
    if(diffUnsubscribe){diffUnsubscribe();diffUnsubscribe=null;}
    diffUnsubscribe=db.collection("homework").doc(id).collection("votes").doc("data").onSnapshot(doc=>{
      const v=doc.exists?(doc.data().votes||{}):{};
      updateDiffDisplay(v); renderDiffButtons(currentUser?(v[currentUser.username]||null):null);
    });
  }
  async function submitDiffVote(score){
    if(!currentUser||!currentCardId)return;
    const ref=db.collection("homework").doc(currentCardId).collection("votes").doc("data");
    const doc=await ref.get(), votes=doc.exists?(doc.data().votes||{}):{};
    if(votes[currentUser.username]===score) delete votes[currentUser.username]; else votes[currentUser.username]=score;
    await ref.set({votes});
  }
  function openAuthForDiff(){ openAuthModal(); }

  // ══ UPLOAD ══
  function handleFiles(e){pendingFiles=[...pendingFiles,...Array.from(e.target.files)];renderPreviews();document.getElementById("uploadBtn").disabled=pendingFiles.length===0;}
  function renderPreviews(){
    const c=document.getElementById("uploadPreviews"); c.innerHTML="";
    pendingFiles.forEach((f,i)=>{const r=new FileReader();r.onload=e=>{const w=document.createElement("div");w.className="upload-preview";w.innerHTML=`<img src="${e.target.result}"/><button class="upload-preview-remove" onclick="removeFile(${i})">&#215;</button>`;c.appendChild(w);};r.readAsDataURL(f);});
  }
  function removeFile(i){pendingFiles.splice(i,1);renderPreviews();document.getElementById("uploadBtn").disabled=pendingFiles.length===0;}
  async function uploadToImgBB(file){
    const fd=new FormData(); fd.append("image",file);
    const res=await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_KEY}`,{method:"POST",body:fd});
    const data=await res.json(); if(!data.success)throw new Error(TEXT.errUploadInternal); return data.data.url;
  }
  async function uploadPhotos(){
    if(!currentUser||!pendingFiles.length)return;
    const btn=document.getElementById("uploadBtn"), ut=document.getElementById("uploadingText");
    btn.disabled=true; ut.classList.remove("hidden");
    try{
      const urls=[]; for(const f of pendingFiles) urls.push(await uploadToImgBB(f));
      await db.collection("homework").doc(currentCardId).collection("photos").add({urls,uploader:currentUser.username,likes:[],timestamp:firebase.firestore.FieldValue.serverTimestamp()});
      pendingFiles=[]; renderPreviews(); document.getElementById("fileInput").value="";
    }catch(err){alert(TEXT.errUploadFailed+err.message);}
    btn.disabled=true; ut.classList.add("hidden");
  }

  // ══ LIGHTBOX ══
  function openLightbox(url){document.getElementById("lightboxImg").src=url;document.getElementById("lightbox").classList.remove("hidden");}
  function closeLightbox(){document.getElementById("lightbox").classList.add("hidden");document.getElementById("lightboxImg").src="";}

  // ══ LEADERBOARD ══
  async function openLeaderboard(){
    document.getElementById("leaderboardModal").classList.remove("hidden");
    const el=document.getElementById("leaderboardList");
    el.innerHTML=`<div style="text-align:center;color:var(--text4);padding:20px;font-size:13px">${TEXT.leaderboardLoading}</div>`;
    try{
      const hw=await db.collection("homework").get(), totals={};
      for(const d of hw.docs){const ph=await db.collection("homework").doc(d.id).collection("photos").get();ph.forEach(p=>{const data=p.data();totals[data.uploader||"?"]=(totals[data.uploader||"?"]||0)+(data.likes?.length||0);});}
      const sorted=Object.entries(totals).sort((a,b)=>b[1]-a[1]);
      if(!sorted.length){el.innerHTML=`<div style="text-align:center;color:var(--text4);padding:30px;font-size:14px">${TEXT.leaderboardEmpty}</div>`;return;}
      const medals=["🥇","🥈","🥉"];
      el.innerHTML=sorted.map(([user,likes],i)=>{
        const isMe=currentUser&&currentUser.username===user;
        return `<div style="display:flex;align-items:center;gap:12px;padding:12px;border-bottom:1px solid var(--border);border-radius:8px;background:${isMe?"rgba(100,210,255,0.05)":"transparent"}">
          <span style="font-size:20px;width:32px;text-align:center">${medals[i]||(i+1)+"."}</span>
          <span style="flex:1;font-size:15px;font-weight:bold;color:${isMe?"var(--accent)":"var(--text)"}">${user}${isMe?TEXT.leaderboardMe:""}</span>
          <span style="color:#ff2d55;font-size:14px">❤️ ${likes}</span>
        </div>`;
      }).join("");
    }catch(e){el.innerHTML=`<div style="color:#ff2d55;text-align:center;padding:20px">${TEXT.leaderboardError}</div>`;}
  }
  function closeLeaderboard(e){if(e&&e.target!==document.getElementById("leaderboardModal"))return;document.getElementById("leaderboardModal").classList.add("hidden");}

  // ══ AUTO-DELETE EXPIRED ══
  async function deleteExpiredCards(){
    const now=new Date(), snap=await db.collection("homework").get();
    snap.forEach(async d=>{const data=d.data(), dt=new Date(`${data.dueDate}T${data.dueTime||"23:59"}:00`);if(now>=dt)await db.collection("homework").doc(d.id).delete();});
  }

  // ══ HELPERS ══
  function showErr(el,msg){el.textContent=msg;el.classList.remove("hidden");}
  function clearErr(id){const e=document.getElementById(id);if(e){e.textContent="";e.classList.add("hidden");}}
  function show(id){document.getElementById(id).classList.remove("hidden");}
  function hide(id){document.getElementById(id).classList.add("hidden");}

  // ══ INIT ══
  applyTexts();
  applyTheme(currentTheme);
  updateAdminDrawerUI();
  deleteExpiredCards();
  setInterval(deleteExpiredCards,60000);
</script>
</body>
</html>
